spring.application.name=backend

# EKI (Ekilex) API
eki.api.base-url=https://ekilex.ee
eki.api.key=${EKI_API_KEY}

# PostgreSQL connection
spring.datasource.url=jdbc:postgresql://db:5432/${POSTGRES_DB}
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
# spring.jpa.hibernate.ddl-auto=update

spring.datasource.driver-class-name=org.postgresql.Driver

spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml


# Oauth2 setup
spring.security.oauth2.client.registration.github.client-id=${GITHUB_CLIENT_ID}
spring.security.oauth2.client.registration.github.client-secret=${GITHUB_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# Used for redirecting user back after logged in via auth provider
# TODO: validate
app.post-login-landing-url=/add
# Used for redirecting user back after logged out
app.post-logout-landing-url=/login

app.words.seed.enabled=false
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
