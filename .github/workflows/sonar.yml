name: SonarCube static analysis

on:
  workflow_dispatch:
  pull_request:
    paths:
      - backend/**
      - frontend/**

jobs:
  backend-sonarqube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: SonarQube backend scan
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          projectBaseDir: ./backend
          args: >
            -Dsonar.organization=glossaar
            -Dsonar.projectName=backend
            -Dsonar.projectKey=glossaar_backend
        env:
          SONAR_TOKEN: ${{ secrets.BACKEND_SONAR_TOKEN }}

  frontend-sonarqube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: SonarQube frontend scan
        uses: SonarSource/sonarqube-scan-action@v7
        with:
          projectBaseDir: ./frontend
          args: >
            -Dsonar.organization=glossaar
            -Dsonar.projectName=frontend
            -Dsonar.projectKey=glossaar_frontend
        env:
          SONAR_TOKEN: ${{ secrets.FRONTEND_SONAR_TOKEN }}