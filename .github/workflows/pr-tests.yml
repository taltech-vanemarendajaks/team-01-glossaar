name: PR Tests

on:
  pull_request:
    branches:
      - main

jobs:
  test-backend:
    name: Run Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          java-version: 21
          distribution: temurin
          cache: maven


      - name: Build and Run Backend Tests
        working-directory: backend
        run: mvn clean test