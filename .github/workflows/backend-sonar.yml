name: SonarCube backend static analysis

on:
  workflow_dispatch:
  pull_request:
    paths:
      - backend/**
  push:
    branches:
      - main

jobs:
  backend-sonarqube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin
          cache: maven
          cache-dependency-path: backend/pom.xml # added for explicityty, actually setup-java can automatically detect this

      - name: Cache SonarQube packages
        uses: actions/cache@v5
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.BACKEND_SONAR_TOKEN }}
        run: |
          cd ./backend
          mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.organization=glossaar -Dsonar.projectName=backend -Dsonar.projectKey=glossaar_backend