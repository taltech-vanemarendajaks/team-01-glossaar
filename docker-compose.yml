services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    image: maven:3.9-eclipse-temurin-21
    working_dir: /app
    volumes:
      - ./backend:/app
      - m2:/root/.m2
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_PROFILES_ACTIVE: dev
    command: sh -lc '
      apt-get update >/dev/null && apt-get install -y entr >/dev/null;
      echo "Watching backend files and restarting Spring on change...";
      find src/main/java src/main/resources pom.xml -type f | entr -n -r sh -lc "
      mvn -q -DskipTests spring-boot:run -Dspring-boot.run.fork=false -Dspring-boot.run.profiles=dev
      "
      '

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${FRONTEND_DEV_PORT:-5173}:5173"
    depends_on:
      - backend
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  pgdata:
  m2:
  frontend_node_modules: