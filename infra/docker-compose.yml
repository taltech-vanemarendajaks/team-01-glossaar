name: glossaar

services:
  frontend:
    # No ports exposed, as nginx will proxy requests to its default port 80
    image: ghcr.io/taltech-vanemarendajaks/team-01-glossaar/frontend:latest
    restart: unless-stopped

  backend:
    # No ports exposed, as nginx will proxy requests to its default port 8080
    image: ghcr.io/taltech-vanemarendajaks/team-01-glossaar/backend:latest
    restart: unless-stopped
    env_file: ../backend/.env
    depends_on:
      - db

  backend-1:
    # No ports exposed, as nginx will proxy requests to its default port 8080
    image: ghcr.io/taltech-vanemarendajaks/team-01-glossaar/backend:latest
    restart: unless-stopped
    env_file: ../backend/.env
    depends_on:
      - db
      - backend # ensure backend will be the one running migrations

  backend-2:
    # No ports exposed, as nginx will proxy requests to its default port 8080
    image: ghcr.io/taltech-vanemarendajaks/team-01-glossaar/backend:latest
    restart: unless-stopped
    env_file: ../backend/.env
    depends_on:
      - db
      - backend # ensure backend will be the one running migrations

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/sites-enabled:/etc/nginx/sites-enabled:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro # using the certs we have on the server
    restart: unless-stopped
    networks:
      - default
    depends_on:
      - frontend
      - backend
      - backend-1
      - backend-2

  db:
    image: postgres:18
    restart: unless-stopped
    container_name: db
    env_file: ../backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql

volumes:
  postgres_data: