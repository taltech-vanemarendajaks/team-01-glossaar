# HTTP to HTTPS redirect for glossaar.href.ee
server {
    listen 80;

    server_name glossaar.href.ee www.glossaar.href.ee;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server block for glossaar.href.ee
server {
    listen 443 ssl; # managed by Certbot

    ssl_certificate /etc/letsencrypt/live/borsibaar.href.ee/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/borsibaar.href.ee/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    server_name glossaar.href.ee www.glossaar.href.ee;

    # root /var/www/glossaar; # necessary for manual deployment
    # index index.html; # necessary for manual deployment

    location / {
        # try_files $uri $uri/ /index.html; # necessary for manual deployment
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://frontend:80; # frontend container
    }

    location /api/ {
        # TODO: proxy to backend container
        # proxy_pass localhost:port
        add_header Content-Type text/plain;
        return 200 'glossaar api';
    }
}
