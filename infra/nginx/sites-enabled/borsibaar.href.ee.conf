# HTTP to HTTPS redirect for borsibaar.href.ee
server {
    listen 80;

    server_name glossaar.href.ee www.glossaar.href.ee;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server block for borsibaar.href.ee
server {
    listen 443 ssl; # managed by Certbot

    ssl_certificate /etc/letsencrypt/live/borsibaar.href.ee/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/borsibaar.href.ee/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

    server_name borsibaar.href.ee www.borsibaar.href.ee;

    # proxy request to borsibaar nginx instance
    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://localhost:6666; # borsibaar bginx that is set up in borsibaar repo.
    }
}
